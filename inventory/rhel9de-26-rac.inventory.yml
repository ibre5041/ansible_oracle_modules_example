all:
  hosts:
    rhel9d:
      address: 192.168.8.213
      oracle_crs_node_vip: rac26ai-a-vip-1
    rhel9e:
      address: 192.168.8.214
      oracle_crs_node_vip: rac26ai-a-vip-2
  children:
    oracle:
      hosts:
        rhel9d:
        rhel9e:
      vars:
        oracle_release: 26ai
        oracle_install_type: rac

  vars:
    oracle_url_base: http://kicklinux9/oracle/26ai/
    scsi:
    - adapter:
        pciSlotNumber: 16
    - adapter:
        pciSlotNumber: 32
    disks:
    - disk: rootdg
      size: 10g
      bus: 0
    - disk: appdg
      size: 100g
      bus: 0
    network:
    - adapter:
      pciSlotNumber: 192
      network: "Public Network"
    - adapter:
      pciSlotNumber: 224
      network: "Barn Network"      
    ram: 16G
    cpu: 2

    vmware:
      vm_folder: VmFolder
      datastore: KINGSTON

    cluster:
      oracle_cluster_name: rac26ai-a
      disks:
        - disk:
            size: 8G
            bus: 1
            count: 4
      addresses:
        rac26ai-a-vip-1: 192.168.8.218
        rac26ai-a-vip-2: 192.168.8.219
        rac26ai-a-scan: [192.168.8.215, 192.168.8.216, 192.168.8.217]

    oracle_crs_scan: rac26ai-a-scan
    oracle_password: Xb6a5ed2ff29f98d
    template: "RHEL9 Template"
