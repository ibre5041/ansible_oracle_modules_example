---

all:
  hosts:
    # NOTE: change "db_server_hostname" to match your server hostname
    gsm-emea:
      address: 192.168.8.78
      ansible_connection: ssh
      ansible_ssh_user: root
      ansible_port: 22
      ansible_ssh_private_key_file: /root/.ssh/id_rsa
      ansible_host: gsm-emea
      
      # These variables are used by install roles
      oracle_release: 19c
      oracle_install_type: gsm
      oracle_url_base: http://kicklinux9/oracle/26ai/
      oracle_gi_media: LINUX.X64_2326100_gsm_home.zip
  children:
    oracle:
      vars:
  vars:
    scsi:
    - adapter:
        pciSlotNumber: 16
    - adapter:
        pciSlotNumber: 32
    disks:
    - disk: rootdg
      size: 10g
      bus: 0
    - disk: appdg
      size: 60g
      bus: 0
    network:
    - adapter:
      pciSlotNumber: 192
      network: "Public Network"
    - adapter:
      pciSlotNumber: 224
      network: "Barn Network"
    ram: 16G
    cpu: 2

    vmware:
      vm_folder: VmFolder
      datastore: KINGSTON
    template: "RHEL9Template"
