---

- hosts: all
  collections:
    - ibre5041.ansible_oracle_modules
  become: true
  become_user: root
  become_method: sudo
  vars:
    password: AcrorA123456__
    oracle_db_ver_path: 23.26.1.0.0
    oracle_home: "{{ oracle_install_dir_prod }}/{{ oracle_db_ver_path }}"

    oracle_sid: EMEA
    source_region: EMEA
    target_region: "{{ region | upper }}"

    duplicate_db_name:        "{{ oracle_sid }}"
    duplicate_db_unique_name: "{{ oracle_sid }}_AT_{{ target_region }}"
    duplicate_primary_tns:    "{{ oracle_sid }}_AT_{{ source_region }}"
    duplicate_standby_tns:    "{{ oracle_sid }}_AT_{{ target_region }}"
    duplicate_aux_host: "{{ inventory_hostname }}"
    duplicate_listener_port: 1530

    duplicate_pfile:        "/home/oracle/init{{ oracle_sid }}.ora"
    duplicate_rman_cmdfile: "/home/oracle/{{ oracle_sid | lower }}_duplicate.rman"
    duplicate_rman_log:     "/home/oracle/{{ oracle_sid | lower }}_duplicate.log"
    duplicate_spfile_asm:   "+XDATA/{{ duplicate_db_unique_name }}/spfile{{ duplicate_db_unique_name }}.ora"

    dg_configuration_name: "{{ oracle_sid }}"
    dg_primary_database:   "{{ oracle_sid }}_AT_{{ source_region }}"
    dg_standby_database:   "{{ oracle_sid }}_AT_{{ target_region }}"
    dg_primary_connect_identifier: "{{ duplicate_primary_tns }}"
    dg_standby_connect_identifier: "{{ duplicate_standby_tns }}"
    dg_dgmgrl_user: sys
    dg_dgmgrl_as: sysdba

  any_errors_fatal: true

  roles:
    - role: default_vars_only
      tags: [always, default_vars_only]

  tasks:

    - name: Return GI facts
      oracle_gi_facts:
        oracle_home: "{{ oracle_home }}"        
      register: _oracle_gi_facts
      tags: [always, duplicate, precheck]
      
    - name: GI facts
      debug: var=_oracle_gi_facts
      tags: [always, duplicate, precheck]

    - name: Derive GI home and listener names from GI facts
      set_fact:
        oracle_crs_home_derived: "{{ _oracle_gi_facts.ansible_facts.oracle_gi_facts.oracle_crs_home }}"
        listener_ora_path: "{{ _oracle_gi_facts.ansible_facts.oracle_gi_facts.oracle_crs_home }}/network/admin/listener.ora"
        duplicate_listener_name: >-
          {{
            (
              _oracle_gi_facts.ansible_facts.oracle_gi_facts.local_listener
              | selectattr('tcp', 'defined')
              | selectattr('tcp', 'equalto', (duplicate_listener_port | string))
              | map(attribute='name')
              | list
              | first
            )
            | default('LISTENER')
          }}
      tags: [always, duplicate, precheck]

    - name: Show derived listener variables
      debug:
        msg:
          - "listener_ora_path={{ listener_ora_path }}"
          - "duplicate_listener_name={{ duplicate_listener_name }}"
          - "listener_static_alias=SID_LIST_{{ duplicate_listener_name }}"
      tags: [always, duplicate, precheck]

    - name: Ensure static registration for auxiliary DB exists in GI listener.ora
      oracle_tnsnames:
        path: "{{ listener_ora_path }}"
        alias: "SID_LIST_{{ duplicate_listener_name }}"
        whole_value: "(SID_LIST=(SID_DESC=(ORACLE_HOME={{ oracle_home }})(SID_NAME={{ oracle_sid }})(SERVICE_NAME={{ duplicate_standby_tns }})))"
      register: listener_static_registration
      become_user: "{{ oracle_os_user }}"
      become: true
      tags: [always, duplicate, precheck]

    - name: Restart duplicate listener after static registration change
      oracle_crs_listener:
        name: "{{ duplicate_listener_name }}"
        state: restarted
      become_user: "{{ oracle_os_user }}"
      become: true
      when: listener_static_registration.changed
      tags: [always, duplicate, precheck]
      
    - name: Check whether standby DB resource already exists in CRS (check mode)
      oracle_crs_db:
        name: "{{ duplicate_db_unique_name }}"
        state: absent
      check_mode: true
      register: duplicate_crs_presence
      become_user: "{{ oracle_os_user }}"
      become: true
      tags: [always, duplicate, precheck]

    - debug: var=duplicate_crs_presence
      tags: [always, duplicate, precheck]

    - name: "set_fact: database_duplicated={{ duplicate_crs_presence.changed }}"
      set_fact:
        database_duplicated: "{{ duplicate_crs_presence.changed }}"
      tags: [always, duplicate, precheck]
      
    - name: Ensure AUX connect descriptor exists in local tnsnames.ora
      oracle_tnsnames:
        path: /home/oracle/.tnsnames.ora
        alias: "{{ duplicate_db_unique_name}}_AUX"
        whole_value: '(DESCRIPTION=(ADDRESS=(PROTOCOL=TCP)(HOST={{ duplicate_aux_host }})(PORT={{ duplicate_listener_port }}))(CONNECT_DATA=(SID={{ oracle_sid }})(UR=A)))'
      become_user: "{{ oracle_os_user }}"
      become: true
      tags: [duplicate, files]

    - name: Create init file for EMEA auxiliary instance
      copy:
        dest: "{{ duplicate_pfile }}"
        owner: "{{ oracle_os_user }}"
        group: oinstall
        mode: '0640'
        content: |
          *.compatible='23.6.0'
          *.db_name='{{ duplicate_db_name }}'
          *.db_unique_name='{{ duplicate_db_unique_name }}'
          *.db_create_file_dest='+XDATA'
          *.db_recovery_file_dest='+XDATA'
          *.db_recovery_file_dest_size=12102m
          *.enable_pluggable_database=true
          *.remote_login_passwordfile='EXCLUSIVE'
          *.open_links=30
          *.open_links_per_instance=30
          *.sga_max_size=4g
          *.sga_target=4g
          *.standby_file_management='AUTO'
          *.dg_broker_start=TRUE
      become_user: "{{ oracle_os_user }}"
      become: true
      when: not duplicate_crs_presence.changed
      tags: [duplicate, nomount]

    - name: Start EMEA auxiliary instance in NOMOUNT
      oracle_sqldba:
        oracle_home: "{{ oracle_home }}"
        oracle_db_name: "{{ duplicate_db_name }}"
        sql: "startup force nomount pfile='{{ duplicate_pfile }}'"
      become_user: "{{ oracle_os_user }}"
      become: true
      when: not duplicate_crs_presence.changed
      tags: [duplicate, nomount]

    - name: Create RMAN duplicate command file
      copy:
        dest: "{{ duplicate_rman_cmdfile }}"
        owner: "{{ oracle_os_user }}"
        group: oinstall
        mode: '0600'
        content: |
          run
          {
            duplicate target database for standby from active database
            spfile
            set db_name='{{ duplicate_db_name }}'
            set db_unique_name='{{ duplicate_db_unique_name }}'
            set standby_file_management='AUTO'
            set instance_name='{{ duplicate_db_name }}'
            nofilenamecheck;
          }
      become_user: "{{ oracle_os_user }}"
      become: true
      when: not duplicate_crs_presence.changed
      tags: [duplicate, rman]

    - name: Duplicate EMEA database from EMEA_AT_EMEA to EMEA_AT_APAC using RMAN
      command: >
        {{ oracle_home }}/bin/rman
        target /@{{ duplicate_primary_tns }}
        auxiliary /
        cmdfile {{ duplicate_rman_cmdfile }}
        log {{ duplicate_rman_log }}
      environment:
        ORACLE_HOME: "{{ oracle_home }}"
        ORACLE_SID: "{{ duplicate_db_name }}"
      become_user: "{{ oracle_os_user }}"
      become: true
      when: not duplicate_crs_presence.changed
      tags: [duplicate, rman]

    - name: Register duplicated standby DB in CRS
      oracle_crs_db:
        name: "{{ duplicate_db_unique_name }}"
        oraclehome: "{{ oracle_home }}"
        dbname: "{{ duplicate_db_name }}"
        instance: "{{ duplicate_db_name }}"
        spfile: "{{ duplicate_spfile_asm }}"
        role: PHYSICAL_STANDBY
        startoption: MOUNT
        stopoption: IMMEDIATE
        state: present
      become_user: "{{ oracle_os_user }}"
      become: true
      tags: [duplicate, crs]

    - name: Start duplicated standby DB in MOUNT mode
      oracle_crs_db:
        name: "{{ duplicate_db_unique_name }}"
        startoption: MOUNT
        state: started
      become_user: "{{ oracle_os_user }}"
      become: true
      tags: [duplicate, crs]

    - name: Ensure local_listener points to EMEA listener endpoint on APAC host
      oracle_parameter:
        mode: sysdba
        name: local_listener
        value: '(ADDRESS=(PROTOCOL=TCP)(HOST={{ ansible_hostname }})(PORT={{ duplicate_listener_port }}))'
        state: present
        scope: both
        sid: '*'
      environment:
        ORACLE_HOME: "{{ oracle_home }}"
        ORACLE_SID: "{{ duplicate_db_name }}"
      become_user: "{{ oracle_os_user }}"
      become: true
      when: not duplicate_crs_presence.changed      
      tags: [duplicate, post]

    - name: Print where RMAN output log is stored
      debug:
        msg: "RMAN duplicate log: {{ duplicate_rman_log }}"
      tags: [duplicate]

    - name: Create Data Guard broker configuration for EMEA
      oracle_dataguard:
        oracle_home: "{{ oracle_home }}"
        dgmgrl_user: "{{ dg_dgmgrl_user }}"
        dgmgrl_as: "{{ dg_dgmgrl_as }}"
        dgmgrl_connect_identifier: "{{ dg_primary_connect_identifier }}"
        state: present
        configuration_name: "{{ dg_configuration_name }}"
        primary_database: "{{ dg_primary_database }}"
        connect_identifier: "{{ dg_primary_connect_identifier }}"
      become_user: "{{ oracle_os_user }}"
      become: true
      when: not duplicate_crs_presence.changed      
      tags: [duplicate, dg]

    - name: Add EMEA standby database into Data Guard configuration
      oracle_dataguard:
        oracle_home: "{{ oracle_home }}"
        dgmgrl_user: "{{ dg_dgmgrl_user }}"
        dgmgrl_as: "{{ dg_dgmgrl_as }}"
        dgmgrl_connect_identifier: "{{ dg_primary_connect_identifier }}"
        state: present
        database_name: "{{ dg_standby_database }}"
        connect_identifier: "{{ dg_standby_connect_identifier }}"
      become_user: "{{ oracle_os_user }}"
      become: true
      when: not duplicate_crs_presence.changed      
      tags: [duplicate, dg]

    - name: Enable Data Guard broker configuration
      oracle_dataguard:
        oracle_home: "{{ oracle_home }}"
        dgmgrl_user: "{{ dg_dgmgrl_user }}"
        dgmgrl_as: "{{ dg_dgmgrl_as }}"
        dgmgrl_connect_identifier: "{{ dg_primary_connect_identifier }}"
        state: present
        enabled: true
      become_user: "{{ oracle_os_user }}"
      become: true
      tags: [duplicate, dg]

    - name: Enable redo apply on standby via broker
      oracle_dataguard:
        oracle_home: "{{ oracle_home }}"
        dgmgrl_user: "{{ dg_dgmgrl_user }}"
        dgmgrl_as: "{{ dg_dgmgrl_as }}"
        dgmgrl_connect_identifier: "{{ dg_primary_connect_identifier }}"
        state: present
        database_name: "{{ dg_standby_database }}"
        database_state: apply-on
      become_user: "{{ oracle_os_user }}"
      become: true
      tags: [duplicate, dg]

    - name: Show Data Guard configuration status
      oracle_dataguard:
        oracle_home: "{{ oracle_home }}"
        dgmgrl_user: "{{ dg_dgmgrl_user }}"
        dgmgrl_as: "{{ dg_dgmgrl_as }}"
        dgmgrl_connect_identifier: "{{ dg_primary_connect_identifier }}"
        state: status
      register: dg_status
      become_user: "{{ oracle_os_user }}"
      become: true
      tags: [duplicate, dg]

    - name: Print Data Guard status summary
      debug:
        var: dg_status.configuration
      tags: [duplicate, dg]
