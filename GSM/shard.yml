---

- hosts: all
  collections:
    - ibre5041.ansible_oracle_modules    
  vars:
    password: AcrorA123456__
    oracle_db_ver_path: 23.26.1.0.0
    oracle_home: "{{ oracle_install_dir_prod }}/{{ oracle_db_ver_path }}"
    #oracle_sid: "APAC"
    wallet_location: "/home/oracle/wallet.shard"
    db_name: "{{ oracle_sid }}"
    db_unique_name: '{{ oracle_sid }}_AT_{{ region | upper }}'
    db_spfile: "+XDATA/{{ db_unique_name }}/spfile{{ oracle_sid | upper }}.ora"
    db_pfile: "{{ oracle_home }}/dbs/init{{ oracle_sid | upper }}.ora"

  any_errors_fatal: true

  roles:    
  - role: default_vars_only
    tags: [always,default_vars_only]
  environment:
    ORACLE_HOME: "{{ oracle_home }}"
    ORACLE_SID:  "{{ oracle_sid }}"
  become_user: "{{ oracle_os_user }}"
  become: true
    
  tasks:      
    - name: "{{ oracle_sid }} create database"
      oracle_db:
        oracle_home: "{{ oracle_home }}"
        db_name: "{{ db_name }}"
        sid: '{{ oracle_sid }}'
        db_unique_name: "{{ db_unique_name }}"
        sys_password: "{{ password }}"
        #
        flashback: true
        archivelog: true
        force_logging: true
        db_options:
          JSERVER: false
          ORACLE_TEXT: false
          IMEDIA: false
          CWMLITE: false
          SPATIAL: false
          OMS: false
          APEX: false
          DV: false
        initparams:
          sga_target: 4G
          sga_max_size: 4G
        storage_type: ASM
        datafile_dest: +XDATA
        recoveryfile_dest: +XDATA
        state: "{{ oracle_db_state | default('present') }}"
        cdb: true
      tags: [oracledb, dbca]
      register: _database

    - name: Create pfile {{ db_pfile }} from spfile
      oracle_sqldba:
        oracle_home: "{{ oracle_home }}"
        oracle_sid: "{{ oracle_sid }}"
        sql: "create pfile='{{ db_pfile }}' from spfile"
      when: _database.changed
      tags: [oracledb, dbca]

    - name: Create spfile symlink in asm instance {{ oracle_sid }}
      oracle_sqldba:
        oracle_home: "{{ oracle_home }}"
        oracle_sid: "{{ oracle_sid }}"
        sql: "create spfile='{{ db_spfile }}' from pfile='{{ db_pfile }}'"
      when: _database.changed
      tags: [oracledb, dbca]
      
    - name: Create databases init.ora file
      copy:
        dest: "{{ db_pfile }}"
        owner: "{{ oracle_os_user }}"
        group: oinstall
        mode: '0640'
        content: |
          spfile='{{ db_spfile }}'
      when: _database.changed          
      tags: [oracledb, dbca]
      
    - name: Manage online redologs
      oracle_redo:
        mode: sysdba
        log_type: redo
        size: 200M
        groups: 4
      tags: [oracledb, redo]

    - name: Manage standby redologs
      oracle_redo:
        mode: sysdba
        log_type: standby
        size: 200M
        groups: 5
      tags: [oracledb, redo]

    - name: Modify CRS config for {{ db_unique_name }} set spfile parameter
      oracle_crs_db:
        name: "{{ db_unique_name }}"
        state: restarted
        spfile: "{{ db_spfile }}"
      when: _database.changed
      tags: [oracledb]

    - name: Remove local spfile now that {{ oracle_sid }} runs on the ASM spfile
      file:
        path: "{{ oracle_home }}/dbs/spfile{{ oracle_sid }}.ora"
        state: absent
      when: _database.changed
      tags: [oracledb]

    - name: 'Create listener LISTENER_{{ oracle_sid }}'
      oracle_crs_listener:
        name: 'LISTENER_{{ oracle_sid }}'
        endpoints: 'TCP:{{ shard_listener_port }}'
        enabled: true
        state: started
      tags: [oracle_listener]
      
    - name: "{{ oracle_sid }} Ensure oracle parameters are set"
      oracle_parameter:
        mode: sysdba
        name: "{{ item.name }}"
        value: "{{ item.value }}"
        state: present
        scope: "{{ item.scope }}"
        sid: '*'
      loop:
        - { name: open_links, value: 30, scope: spfile }
        - { name: open_links_per_instance, value: 30, scope: spfile }
        - { name: standby_file_management, value: auto, scope: both }
        - { name: global_names, value: 'FALSE', scope: both }
        - { name: db_files, value: 1024, scope: spfile }
        - { name: dg_broker_start, value: 'TRUE', scope: both }
        - { name: local_listener, value: '(ADDRESS=(PROTOCOL=TCP)(HOST={{ ansible_hostname }})(PORT={{ shard_listener_port }}))', scope: both }
      tags: [oracledb, keystore]
      register: oracle_parameter_results

    - name: "{{ oracle_sid }} Ensure gsmrootuser is unlocked and password is set"
      oracle_user:
        mode: sysdba
        schema: "{{ item }}"
        schema_password: "{{ password }}"
        state: present
        locked: false
      loop:
        - gsmrootuser
        - gsmuser
      tags: [oracledb]

    - name: "{{ oracle_sid }} Grant SYSDG and SYSBACKUP to gsmuser/gsmrootuser"
      oracle_grant:
        mode: sysdba
        grantee: "{{ item }}"
        grants:
          - SYSDG
          - SYSBACKUP
        state: present
      loop:
        - gsmrootuser
        - gsmuser
      tags: [oracledb]
      
    - name: "{{ oracle_sid }} Creates a pdb P{{ oracle_sid }}"
      oracle_pdb:
        mode: sysdba
        #
        pdb_name: "P{{ oracle_sid }}"
        state: present
        open: true
        save_state: true
        pdb_admin_username: admin
        pdb_admin_password: "{{ password }}"
        roles: [CONNECT, PDB_DBA]
      tags: [oracledb]

    - name: "{{ oracle_sid }} Grant SYSDG and SYSBACKUP to gsmuser"
      oracle_grant:
        mode: sysdba
        session_container: "P{{ oracle_sid }}"
        grantee: GSMUSER
        grants:
          - SYSDG
          - SYSBACKUP
        state: present
      tags: [oracledb]

    - name: GSMADMIN_INTERNAL
      oracle_grant:
        mode: sysdba
        session_container: "P{{ oracle_sid }}"
        grantee: GSMADMIN_INTERNAL
        directory_privs:
          - read,write:data_pump_dir
      tags: [oracledb]
      
    - name: "{{ oracle_sid }} restart database"
      oracle_db:
        oracle_home: "{{ oracle_home }}"
        db_name: "{{ db_name }}"
        db_unique_name: "{{ db_unique_name }}"
        #sys_password: "{{ password }}"
        state: "{{ oracle_db_state | default('restarted') }}"
      tags: [oracledb]

    - name: "Create wallet directory {{ wallet_location}}"
      file:
        path: "{{ wallet_location }}"
        state: "{{ oracle_db_state | default('directory') }}"        
        group: oinstall
        mode: '0700'
      tags: [oracledb, dbca]
      
    - name: "{{ oracle_sid }} tnsnames.ora"
      oracle_tnsnames:
        path: "{{ oracle_home }}/network/admin/tnsnames.ora"
        alias: "{{ item.name }}"
        whole_value: "{{ item.value }}"
      loop:
        - { name: EMEA_AT_EMEA, value: '(DESCRIPTION=(ADDRESS=(PROTOCOL=TCP)(HOST=gsm-shard-emea)(PORT=1530))(CONNECT_DATA=(SERVICE_NAME=EMEA_AT_EMEA)))'}
        - { name: EMEA_AT_APAC, value: '(DESCRIPTION=(ADDRESS=(PROTOCOL=TCP)(HOST=gsm-shard-apac)(PORT=1530))(CONNECT_DATA=(SERVICE_NAME=EMEA_AT_APAC)))'}
        - { name: APAC_AT_APAC, value: '(DESCRIPTION=(ADDRESS=(PROTOCOL=TCP)(HOST=gsm-shard-apac)(PORT=1531))(CONNECT_DATA=(SERVICE_NAME=APAC_AT_APAC)))'}
        - { name: APAC_AT_EMEA, value: '(DESCRIPTION=(ADDRESS=(PROTOCOL=TCP)(HOST=gsm-shard-emea)(PORT=1531))(CONNECT_DATA=(SERVICE_NAME=APAC_AT_EMEA)))'}
        - { name: LISTENER_EMEA, value: '(DESCRIPTION=(ADDRESS=(PROTOCOL=TCP)(HOST={{ ansible_hostname }})(PORT=1530)))'}
        - { name: LISTENER_APAC, value: '(DESCRIPTION=(ADDRESS=(PROTOCOL=TCP)(HOST={{ ansible_hostname }})(PORT=1531)))'}
      tags: [files]

    - name: "{{ oracle_sid }} tnsnames.ora"
      oracle_tnsnames:
        path: "/home/oracle/.tnsnames.ora"
        alias: "{{ item.name }}"
        whole_value: "{{ item.value }}"
      loop:
        - { name: EMEA_AT_APAC_AUX, value: '(DESCRIPTION=(ADDRESS=(PROTOCOL=TCP)(HOST=gsm-shard-apac)(PORT=1530))(CONNECT_DATA=(SID=EMEA)(UR=A)))'}
        - { name: APAC_AT_EMEA_AUX, value: '(DESCRIPTION=(ADDRESS=(PROTOCOL=TCP)(HOST=gsm-shard-emea)(PORT=1531))(CONNECT_DATA=(SID=APAC)(UR=A)))'}
      tags: [files]
      
    - name: "Create wallet directory {{ wallet_location}}"
      file:
        path: "{{ wallet_location }}"
        state: directory
        group: oinstall
        mode: '0700'
      tags: [oracledb, wallet]

    - name: Create TLS wallet with local auto-login
      oracle_orapki:
        oracle_home: "{{ oracle_home }}"
        state: present
        wallet_location: "{{ wallet_location }}"
        wallet_password: "{{ password }}"
        auto_login: local_auto_login
      tags: [oracledb, wallet]
      
    - name: Add primary DB credential for {{ item }}
      oracle_orapki:
        oracle_home: "{{ oracle_home }}"
        wallet_location: "{{ wallet_location }}"
        wallet_password: "{{ password }}"
        credential_state: present
        credential_alias: "{{ item }}"
        credential_db: "{{ item }}"
        credential_user: sys
        credential_password: "{{ password }}"
      tags: [oracledb, wallet]
      loop:
        - EMEA_AT_EMEA
        - EMEA_AT_APAC
        - APAC_AT_APAC
        - APAC_AT_EMEA
      register: _

    - name: wallet
      debug:
        var: _
      tags: [oracledb, wallet]

    - name: "{{ oracle_sid }} sqlnet.ora"
      oracle_tnsnames:
        path: "{{ oracle_home }}/network/admin/sqlnet.ora"
        alias: "{{ item.name }}"
        whole_value: "{{ item.value }}"
      loop:
        - { name: 'WALLET_LOCATION', value: '(SOURCE=(METHOD=FILE)(METHOD_DATA=(DIRECTORY={{ wallet_location }})))' }
        - { name: 'SQLNET.WALLET_OVERRIDE', value: 'TRUE' }
      tags: [oracledb, wallet]

      
